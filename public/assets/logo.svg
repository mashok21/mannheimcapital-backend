<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;700&amp;family=Cormorant+Garamond:ital,wght@1,400&amp;display=swap');
    </style>
  </defs>

  <!-- Background matching page navy -->
  <rect width="800" height="500" fill="#0d1b2e"/>

  <!-- MANNHEIM — Josefin Sans Bold (closest free Futura) -->
  <text
    x="400" y="215"
    text-anchor="middle"
    font-family="'Josefin Sans', Futura, 'Century Gothic', sans-serif"
    font-weight="700"
    font-size="88"
    letter-spacing="20"
    fill="#ffffff"
  >MANNHEIM</text>

  <!-- Left gold rule -->
  <line x1="115" y1="252" x2="268" y2="252" stroke="#b8955a" stroke-width="1"/>

  <!-- CAPITAL — lighter weight, spaced -->
  <text
    x="400" y="266"
    text-anchor="middle"
    font-family="'Josefin Sans', Futura, 'Century Gothic', sans-serif"
    font-weight="300"
    font-size="26"
    letter-spacing="16"
    fill="#ffffff"
  >CAPITAL</text>

  <!-- Right gold rule -->
  <line x1="532" y1="252" x2="685" y2="252" stroke="#b8955a" stroke-width="1"/>

  <!-- Tagline in Cormorant italic -->
  <text
    x="400" y="334"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Garamond, Georgia, serif"
    font-style="italic"
    font-weight="400"
    font-size="25"
    letter-spacing="2"
    fill="#b8955a"
  >Structured. Enduring. Measured.</text>

</svg>
